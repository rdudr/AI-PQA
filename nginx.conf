# ── Nginx config for HF Spaces ──
# Serves React frontend on / and proxies /api/* to the FastAPI backend.
# Listens on port 7860 (Hugging Face Spaces requirement).

worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Allow large PQ file uploads (up to 200 MB)
    client_max_body_size 200M;

    # Temp paths writable without root
    client_body_temp_path /tmp/nginx_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    access_log /tmp/nginx_access.log;

    server {
        listen 7860;
        server_name _;

        # ── Frontend: serve the built React app ──
        root /usr/share/nginx/html;
        index index.html;

        # ── Backend API: proxy to Uvicorn ──
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for large file processing (5 minutes)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ── SPA fallback: all other routes → index.html ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
