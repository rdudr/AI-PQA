services:
  # ── Backend API (FastAPI) ──
  - type: web
    name: ai-pqa-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Supabase Postgres connection string. Set in the Render dashboard.
      # When unset, the app runs purely in-memory (history not persisted).
      - key: DATABASE_URL
        sync: false

  # ── Frontend (Vite static build) ──
  - type: web
    name: ai-pqa-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Full https URL of the API service above. Set as a literal value so
      # Render bakes it into the bundle at build time and no manual dashboard
      # toggle is required. If you fork the repo and rename the API service,
      # override this in the dashboard.
      - key: VITE_API_BASE
        value: https://ai-pqa-api.onrender.com
